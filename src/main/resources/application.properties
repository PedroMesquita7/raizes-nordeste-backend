spring.application.name=raizes-nordeste

# Banco H2 em memoria (modo demo - sem PostgreSQL necessario)
spring.datasource.url=jdbc:h2:mem:raizes_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Console H2 (acesse http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Porta
server.port=8080

# JWT
app.jwt.secret=raizes4710499chave-secreta-pedro-marques-mesquita-nordeste
app.jwt.expiracao-ms=86400000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.flyway.clean-on-validation-error=true
spring.flyway.baseline-on-migrate=true
